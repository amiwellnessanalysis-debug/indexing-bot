name: Google Indexing Bot

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run bot
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python bot.py

      - name: Save queue state
        run: |
          git config user.name "Indexing Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/queue.json
          git diff --staged --quiet || git commit -m "Bot update [skip ci]"
          git push
